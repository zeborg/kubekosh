services:
  kubekosh:
    image: zeborg/kubekosh:latest
    container_name: kubekosh
    restart: unless-stopped
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "7554:80"
    volumes:
      - kubekosh-data:/data
    healthcheck:
      test: ["CMD-SHELL", "pidof node >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
volumes:
  kubekosh-data: