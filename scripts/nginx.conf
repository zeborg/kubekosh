worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # WebSocket upgrade map (Grafana Live, terminal, etc.)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # A root-absolute request whose Referer is an /opencost page belongs to
    # OpenCost (e.g. /logo.png, /favicon.ico). Used to re-route those to the
    # /opencost/ handler so we don't have to rewrite every individual reference.
    map $http_referer $from_opencost {
        default            0;
        "~*/opencost(/|$)" 1;
    }

    # Resolve in-cluster Service DNS at request time via k3s CoreDNS. Using a
    # variable in proxy_pass (below) defers resolution to request time, so nginx
    # still starts when an addon isn't installed yet — those routes just 502
    # until it is.
    resolver 10.43.0.10 valid=30s ipv6=off;

    # Upstream: Node.js API + static frontend + WebSocket PTY
    upstream api {
        server 127.0.0.1:4000;
    }

    server {
        listen 80;
        server_name _;

        # nginx listens on :80 inside the container but is reached at host:7554.
        # Without this, nginx-issued redirects (e.g. /grafana -> /grafana/) become
        # absolute using the listen port (80), dropping the external :7554. Relative
        # redirects make the browser preserve whatever host:port it actually used.
        absolute_redirect off;

        # Grafana's sub-path link generation sometimes double-prefixes the app
        # sub-URL (e.g. /grafana/grafana/connections -> 404). Collapse any run of
        # repeated /grafana/ segments back to a single one and redirect so the URL
        # bar is corrected for client-side routing.
        rewrite ^/grafana/(?:grafana/)+(.*)$ /grafana/$1 redirect;

        # WebSocket terminal — /shell-ws is handled by the Node.js backend
        location /shell-ws {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 7d;
        }

        # API routes
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Traefik dashboard at /traefik/ ──────────────────────────────────
        # Traefik runs with --api.basePath=/traefik and a dashboard IngressRoute
        # (PathPrefix(`/traefik`) -> api@internal) on its `web` entrypoint, so it
        # serves the dashboard at /traefik/dashboard/ and its API at /traefik/api/
        # natively (verified). Plain pass-through to the web service (:80) — no
        # path rewriting, and no /api collision (the dashboard calls /traefik/api/).
        location = /traefik { return 302 /traefik/dashboard/; }
        location /traefik/ {
            set $traefik_upstream traefik.traefik.svc.cluster.local:80;
            proxy_pass http://$traefik_upstream;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }

        # ── Grafana (kube-prometheus-stack) at /grafana/ ────────────────────
        # Proxied to the in-cluster ClusterIP service (stable; no dependency on a
        # port-forward process). Grafana is set up with serve_from_sub_path +
        # root_url=.../grafana via the addon's Helm values.
        location = /grafana { return 301 /grafana/; }
        location /grafana/ {
            set $grafana_upstream kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80;
            proxy_pass http://$grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── OpenCost at /opencost/ ──────────────────────────────────────────
        # Proxied to the in-cluster ClusterIP service. The stock UI is built for
        # the root path, so we rewrite its root-absolute references (/assets/, the
        # router basename, and the /model API base) to be /opencost-prefixed via
        # sub_filter. Best-effort string rewrite of the served HTML/JS/CSS.
        location = /opencost { return 301 /opencost/; }
        location /opencost/ {
            set $opencost_upstream opencost.opencost.svc.cluster.local:9090;
            rewrite ^/opencost/(.*)$ /$1 break;
            proxy_pass http://$opencost_upstream;
            proxy_set_header Host $host;
            # Disable upstream compression so sub_filter can see/modify the body.
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;
            sub_filter_once off;
            sub_filter_types text/html application/javascript text/javascript text/css application/json;
            sub_filter '/assets/' '/opencost/assets/';
            sub_filter '"basename":"/"' '"basename":"/opencost"';
            sub_filter '"/model"' '"/opencost/model"';
        }

        # Everything else → React SPA (served by same Node.js process).
        # Root-absolute assets requested from an /opencost page (e.g. /logo.png)
        # are re-routed into the /opencost/ handler so they hit the OpenCost UI
        # instead of the KubeKosh SPA.
        location / {
            if ($from_opencost) {
                rewrite ^ /opencost$uri last;
            }
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
